<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Thang Máy Thiên Ân</title>
    <meta name="description" content="Thang Máy Thiên Ân — giải pháp thang máy gia đình, tải khách, thi công và bảo trì trọn gói." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Thang Máy Thiên Ân" />
    <meta property="og:description" content="Giải pháp thang máy toàn diện — lắp đặt, bảo trì, báo giá nhanh." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thang Máy Thiên Ân" />
    <meta name="twitter:description" content="Giải pháp thang máy toàn diện — lắp đặt, bảo trì, báo giá nhanh." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="splash" aria-live="polite" aria-busy="true" aria-label="Đang tải trang">
      <div class="splash-bg" aria-hidden="true"></div>
      <div class="splash-grid" aria-hidden="true"></div>
      <div class="splash-inner">
        <div class="splash-logo-wrap">
          <div class="splash-ring splash-ring-1"></div>
          <div class="splash-ring splash-ring-2"></div>
          <img class="splash-logo" src="/logo.png" alt="" width="88" height="88" />
        </div>
        <div class="splash-title">THANG MÁY THIÊN ÂN</div>
        <div class="splash-tagline">Giải pháp thang máy toàn diện</div>
        <div class="splash-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="splash-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="splash-progress-bar" id="splash-progress-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: rgba(255, 255, 255, 0.95);
        transition: opacity 400ms ease, visibility 400ms ease;
      }
      #splash[data-hidden="true"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(900px 520px at 50% 28%, rgba(212, 175, 55, 0.14), transparent 58%),
          radial-gradient(600px 400px at 15% 85%, rgba(56, 120, 200, 0.12), transparent 55%),
          linear-gradient(165deg, #0c1f3a 0%, #071427 48%, #050d18 100%);
      }
      .splash-grid {
        position: absolute;
        inset: 0;
        opacity: 0.35;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent);
      }
      .splash-inner {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 24px;
      }
      .splash-logo-wrap {
        position: relative;
        width: 112px;
        height: 112px;
        margin: 0 auto;
      }
      .splash-logo {
        position: absolute;
        inset: 12px;
        width: 88px;
        height: 88px;
        margin: auto;
        border-radius: 999px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.95);
        padding: 10px;
        box-shadow:
          0 0 0 1px rgba(212, 175, 55, 0.35),
          0 20px 50px rgba(0, 0, 0, 0.45);
        animation: splash-pop 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .splash-ring {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        border: 2px solid transparent;
      }
      .splash-ring-1 {
        border-top-color: rgba(212, 175, 55, 0.9);
        border-right-color: rgba(212, 175, 55, 0.25);
        animation: splash-spin 1.1s linear infinite;
      }
      .splash-ring-2 {
        inset: 6px;
        border-bottom-color: rgba(255, 255, 255, 0.45);
        border-left-color: rgba(255, 255, 255, 0.12);
        animation: splash-spin 1.6s linear infinite reverse;
      }
      .splash-title {
        margin-top: 22px;
        font-weight: 800;
        letter-spacing: 0.14em;
        font-size: 15px;
        text-transform: uppercase;
        animation: splash-fade-up 700ms ease 120ms both;
      }
      .splash-tagline {
        margin-top: 8px;
        font-size: 13px;
        font-weight: 500;
        color: rgba(212, 175, 55, 0.92);
        letter-spacing: 0.04em;
        animation: splash-fade-up 700ms ease 220ms both;
      }
      .splash-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 18px;
        animation: splash-fade-up 700ms ease 320ms both;
      }
      .splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: rgba(212, 175, 55, 0.85);
        animation: splash-dot 1.1s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      .splash-progress {
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(420px, 86vw);
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px 999px 0 0;
        overflow: hidden;
      }
      .splash-progress-bar {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, #b8922e, #f5e6b8, #d4af37);
        box-shadow: 0 0 12px rgba(212, 175, 55, 0.55);
        transition: width 80ms linear;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-pop {
        from { opacity: 0; transform: scale(0.88); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-dot {
        0%, 80%, 100% { opacity: 0.35; transform: scale(0.85); }
        40% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-ring, .splash-dots span, .splash-logo {
          animation: none !important;
        }
        .splash-progress-bar { transition: none; }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
