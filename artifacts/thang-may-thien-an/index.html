<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Thang Máy Thiên Ân</title>
    <meta name="description" content="Thang Máy Thiên Ân — built on Replit. Update this description to reflect the app." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Thang Máy Thiên Ân" />
    <meta property="og:description" content="Thang Máy Thiên Ân — built on Replit. Update this description to reflect the app." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thang Máy Thiên Ân" />
    <meta name="twitter:description" content="Thang Máy Thiên Ân — built on Replit. Update this description to reflect the app." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="splash" aria-label="Loading">
      <div class="splash-inner">
        <img class="splash-logo" src="/favicon.svg" alt="Thang Máy Thiên Ân" />
        <div class="splash-title">THANG MÁY THIÊN ÂN</div>
        <div class="splash-subtitle">Đang tải…</div>
      </div>
    </div>
    <div id="root"></div>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: radial-gradient(1200px 700px at 50% 35%, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0) 55%),
          linear-gradient(180deg, #0b1c33 0%, #071427 100%);
        color: rgba(255, 255, 255, 0.92);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        transition: opacity 280ms ease, visibility 280ms ease;
      }
      #splash[data-hidden="true"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-inner {
        text-align: center;
        padding: 24px;
      }
      .splash-logo {
        width: 88px;
        height: 88px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        padding: 10px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        animation: splash-pop 650ms ease-out both, splash-float 1800ms ease-in-out infinite 650ms;
      }
      .splash-title {
        margin-top: 16px;
        font-weight: 800;
        letter-spacing: 0.12em;
        font-size: 14px;
        text-transform: uppercase;
      }
      .splash-subtitle {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.72);
        position: relative;
        display: inline-block;
        padding-right: 22px;
      }
      .splash-subtitle::after {
        content: "";
        position: absolute;
        right: 0;
        top: 50%;
        width: 12px;
        height: 12px;
        margin-top: -6px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: rgba(255, 255, 255, 0.9);
        animation: splash-spin 900ms linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes splash-pop {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.92);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes splash-float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-logo,
        .splash-subtitle::after {
          animation: none !important;
        }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
