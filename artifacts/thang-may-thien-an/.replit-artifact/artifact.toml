kind = "web"
previewPath = "/"
title = "Thang Máy Thiên Ân"
version = "1.0.0"
id = "artifacts/thang-may-thien-an"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25877

[services.development]
run = "pnpm --filter @workspace/thang-may-thien-an run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thang-may-thien-an", "run", "build" ]
publicDir = "artifacts/thang-may-thien-an/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25877"
BASE_PATH = "/"
